exec-once = sh -c '[ -x /usr/local/bin/yubikey-lock-if-absent.sh ] && /usr/local/bin/yubikey-lock-if-absent.sh'
exec-once = sh -c 'sleep 2 && [ -x $HOME/.config/hypr/scripts/align-acers.sh ] && $HOME/.config/hypr/scripts/align-acers.sh'
exec-once = $HOME/.config/hypr/scripts/awww_init.sh
exec-once = ags run
exec-once = wl-clip-persist --clipboard both
exec-once = kanshi
exec-once = dbus-update-activation-environment --systemd --all
exec-once = $HOME/.local/bin/auto-vpn.sh
exec-once = hypridle
# Ensure DisplayLink is up after a safe-exit relogin (no-op on systems without it).
exec-once = sh -c "sudo -n systemctl start displaylink.service 2>/dev/null || true"
